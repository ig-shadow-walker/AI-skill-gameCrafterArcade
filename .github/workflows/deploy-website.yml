# Publishes website/ to GitHub Pages (static HTML).
#
# One-time setup: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions
# (Pick the "GitHub Actions" option, not "Deploy from a branch".)
#
# URL: https://<user>.github.io/<repo>/  (see Settings → Pages after a green run)

name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Do not cancel in-progress Pages deploys — avoids broken partial publishes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
